sonar.projectKey=rudrigaum
sonar.organization=Rodrigo Cerqueira

sonar.projectName=InvestTrack
sonar.projectVersion=1.0.0

sonar.sources=app/src/main
sonar.tests=app/src/test,app/src/androidTest
sonar.java.binaries=app/build/intermediates/javac

# Coverage report generated by Kover
sonar.coverage.jacoco.xmlReportPaths=build/reports/kover/report.xml

# Exclusions
sonar.exclusions=\
  **/*Test*/**,\
  **/R.class,\
  **/R$*.class,\
  **/BuildConfig.*,\
  **/generated/**